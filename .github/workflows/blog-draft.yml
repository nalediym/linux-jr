name: /blog-draft on tombstone

# Phase 5 — NEW. Turns rejection incidents into content velocity.
#
# Trigger: a commit message contains `REJECTED:` or `FIX-INCIDENT:`.
# These are the canonical markers for (a) walked-back design directions
# like the engine/terminal-extension REJECTED tombstone, and (b)
# post-incident retrospectives where a sloppy pattern escaped to prod.
#
# Each such commit auto-drafts a blog post about the lesson. The
# draft lives at docs/drafts/ for the user to finish and publish.
#
# Philosophy: every sloppy-guard check that gets ADDED is because
# something escaped. That "something" is worth writing about. This
# workflow makes the write-up the default outcome.
#
# STATUS: STUB.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-commit:
    name: is this a tombstone commit?
    runs-on: ubuntu-latest
    outputs:
      is-tombstone: ${{ steps.check.outputs.is-tombstone }}
      commit-subject: ${{ steps.check.outputs.commit-subject }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          SUBJECT=$(git log -1 --pretty=%s)
          echo "commit-subject=$SUBJECT" >> $GITHUB_OUTPUT
          if echo "$SUBJECT" | grep -qE '(REJECTED:|FIX-INCIDENT:)'; then
            echo "is-tombstone=true" >> $GITHUB_OUTPUT
          else
            echo "is-tombstone=false" >> $GITHUB_OUTPUT
          fi

  draft:
    needs: check-commit
    if: ${{ needs.check-commit.outputs.is-tombstone == 'true' && vars.BLOG_DRAFT_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate blog draft
        run: |
          # gstack research --topic "${{ needs.check-commit.outputs.commit-subject }}" \
          #   --mode blog-draft \
          #   --output docs/drafts/$(date +%Y-%m-%d)-tombstone.md
          echo "/blog-draft stub — activate when skill has CI runner"

      - name: Commit draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # git add docs/drafts/
          # git commit -m "docs(drafts): auto-draft from tombstone commit"
          # git push
          echo "Commit step pending — activate when /gstack research runs in CI"
