name: Codex second-opinion review

# Phase 4 / Phase 5 — the dual-AI review pattern from Addy Osmani.
# Runs AFTER CodeRabbit on every PR for an independent second opinion.
#
# Requires /codex skill infra to be runnable in GitHub Actions — this
# file is currently a STUB that documents the intended workflow.
# Activate by installing codex-cli in the runner + wiring OPENAI_API_KEY.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  codex:
    name: /codex review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.CODEX_REVIEW_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up codex CLI
        run: |
          # TODO(codex-setup): wire up the codex CLI install once the
          # tool has a publishable binary. For now this is a stub.
          echo "codex CLI setup goes here"

      - name: Run /codex review against the diff
        run: |
          # Pseudo-invocation — replace with real codex CLI call.
          # codex review --base $GITHUB_BASE_REF --head $GITHUB_SHA \
          #   --output-format github-pr-comment \
          #   > review.md
          echo "codex review stub"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Post review as PR comment
        if: ${{ !cancelled() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            if (!fs.existsSync('review.md')) {
              console.log('No review.md produced — skipping comment')
              return
            }
            const body = fs.readFileSync('review.md', 'utf8')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 /codex second-opinion review\n\n${body}`,
            })
