name: /pimp — draft on merge

# Phase 5. When a PR merges to main, run /pimp to draft social posts
# about the change. Creates a GitHub Discussion (not an auto-post) so
# the user reviews before publishing. Content velocity ≠ auto-post.
#
# STATUS: STUB.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  pimp:
    name: draft social posts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.pull_request.merged == true && vars.PIMP_SKILL_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run /pimp in draft mode
        run: |
          # gstack pimp --mode draft --from-pr ${{ github.event.pull_request.number }} \
          #   --output pimp-drafts.md
          echo "/pimp skill stub — activate when skill has CI runner"

      - name: Create GitHub Discussion with drafts
        if: ${{ !cancelled() && hashFiles('pimp-drafts.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('pimp-drafts.md', 'utf8')
            // Needs a Discussion category — use 'Announcements' or create 'Drafts'
            console.log('Discussion draft:\n' + body)
