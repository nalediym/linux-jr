name: Playwright E2E

on:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: M1 smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx --bun playwright install --with-deps webkit
      - run: bun run build
      - run: bunx --bun playwright test --web-server-command="bunx vite" --web-server-timeout=120000

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
