name: Post-deploy canary

# Runs after every prod deploy to Vercel. Hits the live URL, checks
# for console errors, runs the M1 smoke test against production.
#
# If the canary fails, it opens a GitHub Issue labeled `canary-failed`
# with the evidence. Auto-rollback via vercel rollback is gated behind
# VERCEL_TOKEN being set and the `AUTO_ROLLBACK` repo variable = "true"
# — enable only when ready.

on:
  deployment_status:
    # Only fire when a deployment flips to success
  workflow_dispatch:  # allow manual re-run

jobs:
  canary:
    name: canary against prod
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx --bun playwright install --with-deps chromium

      - name: Run smoke test against prod
        id: smoke
        run: bunx --bun playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://linux-jr.vercel.app

      - name: Check prod health headers
        if: ${{ !cancelled() }}
        run: |
          set -e
          STATUS=$(curl -sI https://linux-jr.vercel.app | head -1 | awk '{print $2}')
          if [ "$STATUS" != "200" ]; then
            echo "❌ prod returned HTTP $STATUS"
            exit 1
          fi
          # Fail if title missing or wrong
          curl -s https://linux-jr.vercel.app | grep -q '<title>Linux Jr</title>' || exit 1
          echo "✓ prod health check passed"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Canary failed after deploy ${context.sha.slice(0,7)}`,
              body: `Canary detected a regression after the latest prod deploy.

**Commit:** ${context.sha}
**Deploy URL:** https://linux-jr.vercel.app
**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

Check the Playwright report artifact for details.

Per \`docs/SLOs.md\`, if this is SLO 8 violation (error rate >2% for 15 min), a rollback should fire. Manual rollback: \`vercel rollback\`.`,
              labels: ['canary-failed', 'bug'],
            })

      # Optional auto-rollback — only fires when the repo has
      # AUTO_ROLLBACK variable set to "true". Disabled by default.
      - name: Auto-rollback (if enabled)
        if: failure() && vars.AUTO_ROLLBACK == 'true'
        run: |
          # Requires VERCEL_TOKEN secret set on the repo
          bunx --bun vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes
