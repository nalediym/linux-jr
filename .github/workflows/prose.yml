name: Prose lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - 'src/data/missions/**/*.js'
      - '.vale/**'
      - '.vale.ini'

jobs:
  vale:
    name: vale
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Vale
        uses: errata-ai/vale-action@reviewdog
        with:
          # Vale itself, run directly. We tried vale-action with reviewdog but
          # its fail_on_error semantics treat WARNING findings as failures
          # regardless of `level` config — so prose preferences blocked CI.
          # Skip reviewdog and run vale's own check instead; fail only on
          # ERROR-level findings (SOUL.md banned words via LinuxJr.BannedWords).
          fail_on_error: false
          files: all
          version: 3.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Independently fail the job if vale reports any error-level findings.
      # Vale's `--minAlertLevel=error` lists only the rules we treat as gates.
      - name: Vale gate (error-level only)
        run: |
          curl -sL https://github.com/errata-ai/vale/releases/download/v3.9.0/vale_3.9.0_Linux_64-bit.tar.gz | tar xz vale
          ./vale --minAlertLevel=error --output=line .
          exit $?
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  alex:
    name: alex (inclusive language)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: alex
        run: bunx --bun alex --diff README.md docs/**/*.md src/data/missions/*.js || true
