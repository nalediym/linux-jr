name: Prose lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - 'src/data/missions/**/*.js'
      - '.vale/**'
      - '.vale.ini'

jobs:
  vale:
    name: vale
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      # Run vale directly from the official release tarball. We tried
      # errata-ai/vale-action with reviewdog several times — its
      # fail_on_error semantics treat any reviewdog finding as a failure
      # regardless of severity, which made WARNING-level prose preferences
      # block CI. The direct binary respects --minAlertLevel cleanly.
      - name: Install vale
        run: |
          curl -sL https://github.com/errata-ai/vale/releases/download/v3.9.0/vale_3.9.0_Linux_64-bit.tar.gz \
            | tar xz vale
          chmod +x vale
          ./vale --version

      # Download the style packs declared in .vale.ini (Microsoft, alex).
      # The vale-action did this automatically; the direct binary does not.
      - name: Sync vale styles
        run: ./vale sync

      # Print all findings (any severity) to the log for visibility, then
      # gate the job on error-level findings only — currently
      # LinuxJr.BannedWords (SOUL.md banned words) and Vale.Spelling.
      - name: Vale (advisory pass — log only)
        run: ./vale --output=line . || true

      - name: Vale gate (error-level only)
        run: ./vale --minAlertLevel=error --output=line .

  alex:
    name: alex (inclusive language)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: alex
        run: bunx --bun alex --diff README.md docs/**/*.md src/data/missions/*.js || true
