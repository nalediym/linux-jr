name: /qa skill

# Phase 5 — the Naledi-flavored automation layer.
# Runs the /qa skill against the Vercel preview URL on every PR.
# Posts a bug report as a PR comment with screenshots.
#
# STATUS: STUB. gstack skills currently run on the user's local machine
# (not in GitHub Actions). Activate when the skill has a publishable
# runner image.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:

jobs:
  qa:
    name: /qa against preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ vars.QA_SKILL_ENABLED == 'true' && github.event.pull_request.draft == false }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel preview URL
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300

      - name: Run /qa skill against preview
        id: qa
        run: |
          # Pseudo-invocation: replace when /qa has a CI-ready runner.
          # gstack qa --url ${{ steps.preview.outputs.url }} --tier quick \
          #   --output-format github-pr-comment > qa-report.md
          echo "/qa skill stub — activate when skill has CI runner"

      - name: Post QA report
        if: ${{ !cancelled() && hashFiles('qa-report.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('qa-report.md', 'utf8')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🧪 /qa skill — auto-run against preview\n\n${body}`,
            })
