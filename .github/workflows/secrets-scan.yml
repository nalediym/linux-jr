name: Secrets Scan

on:
  pull_request:    # every PR, regardless of target branch — covers stacked PRs
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Using the gitleaks binary directly (free for any repo visibility).
      # The official gitleaks-action v2 requires a license for private repos.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.28.0"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (full history scan on main, diff scan on PR)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source=. --verbose --redact --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            gitleaks detect --source=. --verbose --redact
          fi
