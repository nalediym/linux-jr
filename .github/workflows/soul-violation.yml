name: /soul-violation judgment

# Phase 5 — NEW. The judgment-layer companion to the mechanical
# Sloppy Guard.
#
# Sloppy Guard catches what regex can catch: banned words, missing
# files, debug statements. It can't catch semantic soul violations
# like "this mission's tone drifted from Nick Jr. register" or "this
# new copy implies a villain even though it never says the word".
#
# This workflow runs Claude with SOUL.md as context against every PR
# diff and flags possible soul violations beyond what regex can see.
#
# STATUS: STUB — needs the Anthropic SDK wired into a GitHub Action
# with API key access.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:

jobs:
  review:
    name: SOUL.md judgment review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.SOUL_REVIEW_ENABLED == 'true' && github.event.pull_request.draft == false }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect PR diff + SOUL.md
        id: collect
        run: |
          # Gather diff + the SOUL.md doctrine.
          git diff origin/${{ github.base_ref }}...HEAD > pr-diff.txt
          echo "DIFF_LINES=$(wc -l < pr-diff.txt)" >> $GITHUB_OUTPUT

      - name: Ask Claude for soul-fit judgment
        if: ${{ steps.collect.outputs.DIFF_LINES != '0' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Pseudo-invocation:
          # claude -p "You are reviewing a PR against SOUL.md. Read
          #   SOUL.md and the diff. Flag possible soul violations that
          #   a regex-based guard would miss. Use Conventional Comments
          #   format (suggestion:, issue:, question:, praise:)." \
          #   < SOUL.md pr-diff.txt > soul-review.md
          echo "/soul-violation stub — wire Anthropic SDK"

      - name: Post review as PR comment
        if: ${{ !cancelled() && hashFiles('soul-review.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('soul-review.md', 'utf8')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 👁️ SOUL.md judgment review\n\n${body}\n\n---\n*This is the judgment-layer companion to the mechanical Sloppy Guard. Regex catches banned words; this catches semantic drift.*`,
            })
