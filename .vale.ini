StylesPath = .vale/styles
# Suppress INFO/suggestion-level findings; they overflow GitHub's per-step
# annotation cap (10 each) and cause reviewdog to exit non-zero even when
# nothing fails. We only care about WARNING and ERROR.
MinAlertLevel = warning
Vocab = LinuxJr

# Use Microsoft + alex style packs + our project-specific vocab
Packages = Microsoft, alex

[formats]
# Treat MDX like MD for lint purposes
mdx = md

[README.md]
# Public-facing prose: run project rules + Microsoft style + inclusive language.
BasedOnStyles = Vale, Microsoft, alex, LinuxJr

# Accept our canonical vocabulary (character names, commands)
Vale.Terms = NO
Microsoft.FirstPerson = NO
Microsoft.Contractions = NO
Microsoft.GeneralURL = warning
# Em-dashes around ' — ' are intentional voice; the project uses them throughout.
Microsoft.Dashes = warning

# Enforce SOUL.md banned words as errors on user-facing prose
LinuxJr.BannedWords = error
LinuxJr.CharacterNames = warning

[src/data/missions/*.js]
# Mission prose lives in JS strings — lint what we can extract
BasedOnStyles = LinuxJr
LinuxJr.BannedWords = error
