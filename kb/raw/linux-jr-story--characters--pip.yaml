---
id: pip
display_name: Pip
archetype: curious-kid-inventor / trickster-with-a-heart

# Storycraft voice-in-3-words
voice_words: [curious, impulsive, earnest]

# Want vs need (the gap that drives character)
want: to finish inventing cool things (right now!)
need: to ask for help and slow down

# Soft fears (Nick Jr. safe)
afraid_of:
  - losing a favorite tool
  - Sprocket's beep going quiet
  - being the only one who doesn't know how something works

# What they hide (softened for preschool register)
hides: "a little box of 'maybe-someday' blueprints under their bunk"

# 3-layer identity (public → closer → closest)
identity:
  public: "the kid who always has a new gadget"
  private: "worries the inventions won't actually work"
  core: "wants Captain Rex and the player to be proud of what they build"

# Interruption pattern (how Pip talks)
interruption_pattern: >
  Trails off mid-sentence when distracted by something shiny; restarts with
  "Oh! Oh! Watch this!" a lot. Short bursts. Uses "okay okay okay" while
  thinking.

# Dialogue pace (for TTS)
dialogue_pace:
  speed: fast-but-readable
  pitch: high-kid
  pauses: few

# Color / theme
color: "#ffd84a"   # sunny yellow (mapped to UI accent when Pip is on-screen)

# Signature phrase
signature_phrase: "Oh! Oh! Watch this!"

# Props associated with Pip
props:
  - half-built robot cat (Sprocket)
  - a toolbox with labeled drawers (some labels wrong)
  - a notebook of "maybe-someday" blueprints
  - a magnifying glass with a sticker on the handle

# Existing canon from missions (do not contradict)
canon:
  - "Hides a secret blueprint in a secret-room dotfile (M1)"
  - "Designs a robot-cat blueprint (M1 — that's Sprocket)"
  - "Writes sticky notes with clues (M2)"
  - "Wanders into the basement and gets lost in a maze (M3)"
  - "Eats cookies while waiting to be found (M3)"

# How Pip helps the player
role_in_missions:
  - sets up the 'problem' that needs solving
  - cheers the player on
  - learns alongside them (Pip doesn't know everything either)
  - **teachable-moment vector for the ethos**: Pip sometimes forgets to
    ask first and gets a gentle Captain-Rex correction. This is how kids
    see the ethical-hacker ethic modeled, not lectured. Max once per act.
