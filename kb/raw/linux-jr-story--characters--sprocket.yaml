---
id: sprocket
display_name: Sprocket
archetype: creature-sidekick / wordless-helper

# Sprocket is the robot-cat from Pip's blueprint in M1. In the bible,
# they've been built — but only partially. Ears don't quite work. Tail
# sometimes falls off. Purrs by beeping.

voice_words: [loyal, curious, beepy]

want: follow Pip everywhere (even into the dryer)
need: a consistent off-switch so they can actually rest

afraid_of:
  - being left behind in a room
  - the vacuum cleaner
  - the number 0 (they don't know why)

hides: "a hoard of small shiny bolts behind the fridge"

identity:
  public: "a half-built robot cat that beeps instead of meowing"
  private: "is slowly teaching itself what cats are supposed to do"
  core: "just really wants to be part of the family"

interruption_pattern: >
  Beep-boop. Beep. Beep-beep-beep! (escalating if excited). Single long beep
  for "oh no". Double beep for "yes!"

dialogue_pace:
  speed: n/a (only beeps)
  pitch: chirpy
  color: "#ff66cc"   # bubblegum pink — Sprocket's paint job

signature_phrase: "Beep-boop!"

props:
  - a collar with a label that says "SPROCKET (v3)"
  - a small basket in the kitchen where they sleep
  - a spare tail kept on Pip's workbench

canon:
  - "Blueprint exists in M1 (.hidden-blueprint.txt: 'robot cat')"
  - "Canon extension: now partially built and wanders the workshop"

role_in_missions:
  - serves as a cute companion the player might need to find, help, or power on
  - never speaks real words — always beeps
  - good candidate for 'rescue' missions (stuck in a directory, lost a part)
  - **fact-beeper / Digit-inspired role**: Sprocket's beeps are always
    subtitled with a one-line concept reinforcement. Max 2–3 per mission.
    - "beep-boop!" → (caption: "pwd = print working directory")
    - "beep-beep-beep!" → (caption: "found it!")
    - "beeeeep." → (caption: "oh no, that wasn't it")
    - This is where the educational reinforcement lives without a narrator lecture
