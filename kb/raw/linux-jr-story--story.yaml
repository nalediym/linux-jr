---
# Linux Jr — World Bible
# Adapted from storycraft-init Core Questions. No stats, no branching —
# this is a tutorial-game, not interactive fiction. The bible exists so
# missions feel like they belong to one universe.

title: Linux Jr
tagline: Real Linux. Real kid.
pitch: Type real commands. Use them kindly. Help your friends.

# THE HEART — everything else in this bible serves this ONE thing
# (Full detail in world/commands.md)
heart:
  statement: Real Linux commands, typed by a real kid.
  outcome: >
    By the end of Season 1, the kid can open a real Terminal on a real
    Mac, type pwd, ls, cd, cat, mkdir, touch, and echo confidently, and
    understand what each one does. That muscle memory transfers to every
    Linux system they will ever touch.
  never_compromise:
    - commands are real (no pretend Linux)
    - typing is mandatory (no click-to-execute shortcuts)
    - kid graduates to a real Terminal at the end
    - no gamification at the cost of muscle memory
  hierarchy:
    1_heart: real Linux commands (commands.md)        # THIS
    2_how_we_use: ethical-hacker ethos (ethos.md)
    3_how_we_teach: Cyberchase pedagogy (educational.md)
    4_where: workshop + characters (setting.md, characters/*)
  tiebreaker: >
    If any upper layer ever conflicts with "real commands taught by real
    typing," the heart wins. Ethos bends. Pedagogy bends. Narrative bends.
    Commands do not bend.

# HOW WE USE THE HEART — the ethic that shapes every command use
# (Full detail in world/ethos.md)
ethos:
  identity: ethical hacker-in-training
  principles:
    - Ask first. Get permission before poking around.
    - Help, never harm. Use what you know to fix, not to break.
    - Look before you act. ls and cat come before mkdir and echo.
    - Say what you did. Leave notes. Be honest about changes.
    - Curiosity is a superpower — when you use it kindly.
  kid_paraphrase: >
    An ethical hacker is really curious, really clever, and really kind.
    They learn how things work so they can help when something breaks.
    They always ask first. They always say what they did. And they never
    peek where they weren't invited.

# Q1: Premise (one sentence, no names)
premise: >
  A kid learns to use real Linux commands — the same ones professional
  engineers type every day — inside a cozy tinker-workshop where they
  help Pip, Captain Rex, and Sprocket. Ethics shapes how they use the
  commands. The commands themselves are the heart.

# Q2: Tone
tone:
  anchor: Nick Jr. / Bluey / Octonauts / Daniel Tiger
  register: preschool-friendly, ages 2–7 (gameplay scales up to 10+)
  feelings: cozy, curious, silly, warm, proud-when-solved
  never: scary, mean, violent, sad-without-resolution, dangerous

# Q3: Protagonist (the player — silent, unnamed)
protagonist:
  name_field: "{player_name}"     # not surfaced in-game
  role: ethical-hacker-in-training / visiting friend
  want: help Pip and Captain Rex with whatever needs doing
  need: learn that commands are a superpower, and superpowers come with manners
  arc: from curious visitor → trusted ethical hacker (earns the White Hat by the end)

# Q4: Cast (3 recurring characters)
cast:
  - id: pip
    role: kid-inventor friend
    see: characters/pip.yaml
  - id: captain_rex
    role: tinker-mentor, owner of the workshop
    see: characters/captain-rex.yaml
  - id: sprocket
    role: Pip's half-built robot-cat sidekick
    see: characters/sprocket.yaml

# Q5: Hook — why do kids come back?
hook: >
  Every mission is a small thing gone slightly wrong in a warm place full
  of friends. Typing real commands is a secret-language superpower — and
  using it kindly is what makes the kid an ethical hacker.

# Q6: Length
scope:
  missions: 10
  acts: 3
  act_1: "Find & Look (missions 1–3: pwd, ls, cd, cat, dotfiles)"
  act_2: "Make & Fix (missions 4–6: mkdir, touch, echo, simple pipes?)"
  act_3: "Combine (missions 7–10: put it all together for bigger puzzles)"

# Q7: "Endings" — per-act celebration states (all three badges reinforce the ethos)
endings:
  act_1: "You find things and ask before acting. (earns: Scout badge)"
  act_2: "You build and fix — always with permission. (earns: Helper badge)"
  act_3: "You can do it all, and you do it right. (earns: White Hat badge)"

# Q8: Core mechanic
mechanic:
  type: typed-command tutorial
  commands_introduced_by_act:
    act_1: [pwd, ls, cd, cat]
    act_2: [mkdir, touch, echo]
    act_3: [combinations, help, man]
  no_damage: true
  no_fail_states: true
  hints_always_available: ".hint files in every room"

# Educational framework (Cyberchase-inspired)
# Full detail in world/educational.md
education:
  inspiration: Cyberchase (PBS) — explicit goals, real-world callbacks, logic puzzles
  two_tracks:
    linux: real commands (surface skill)
    computational_thinking: decomposition, pattern matching, abstraction, sequencing
  mission_shape:
    - hook           # real-world relatable opener
    - mission_brief  # Captain Rex invitation (ethos)
    - concept_intro  # Pip explains the idea in 1-2 sentences
    - adventure      # the command puzzle
    - real_world     # callback card: where this shows up in real life
    - ethos_reflection  # Captain Rex: you asked, you looked, you noted
  vocabulary_ladder:
    act_1: [directory, file, path, hidden, flag, root, parent, listing]
    act_2: [create, empty_file, write, contents, marker, structure]
    act_3: [search, organize, combine, project, command, help]
  sprocket_role: fact-beeper (Digit-inspired) — beep captions reinforce the lesson
  never_words: [syscall, kernel, shell, stdin, stdout, exit_code, permission]

# Setting summary (see world/setting.md for detail)
setting:
  name: The Workshop
  type: cozy standalone tinker-workshop/home
  occupants: Pip, Captain Rex, Sprocket
  player_role: visiting friend who comes by to help

# Style rules (see world/style.md for detail)
style:
  vocab: simple, short sentences, 1-3 per story block
  never_say: [wrong, error, failed, bad, stupid]
  always_say: [try, let's see, got it, nice work, hmm]
  signature_phrases:
    pip: "Oh! Oh! Watch this!"
    captain_rex: "Let's have a look."
    sprocket: "Beep-boop!"
