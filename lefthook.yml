# Lefthook — git hooks manager.
#
# Phase 2 + Phase 7.5 of the DevOps plan.
# Local mirror of CI checks + ADHD-safe public-repo protocols.
# See PROTOCOLS.md.
#
# Run `bunx lefthook install` once to wire up the hooks.

pre-commit:
  parallel: true
  commands:
    lint-staged:
      glob: "*.{js,jsx}"
      run: bunx lint-staged
    guard-quick:
      # Quick subset of the full guard — just the fast HARD checks.
      run: |
        set -e
        if grep -rn --include='*.js' --include='*.jsx' -E 'console\.(log|debug)\(|^[[:space:]]*debugger;?' src/ 2>/dev/null; then
          echo "✗ console.log/debug/debugger found in src/ — remove before committing"
          exit 1
        fi

commit-msg:
  commands:
    commitlint:
      # Enforce Conventional Commits on every commit message.
      run: bunx --bun commitlint --edit {1}

pre-push:
  commands:
    public-repo-warning:
      # Phase 7.5: visible reminder that this is a public repo.
      # ADHD-safe protocol — see PROTOCOLS.md.
      run: |
        REMOTE=$(git remote get-url origin 2>/dev/null || echo "")
        if printf "%s" "$REMOTE" | grep -q 'nalediym/linux-jr'; then
          printf "\n\033[1;36m╔════════════════════════════════════════════════╗\033[0m\n"
          printf "\033[1;36m║  🌍 PUSHING TO A PUBLIC REPO                    ║\033[0m\n"
          printf "\033[1;36m║  nalediym/linux-jr                              ║\033[0m\n"
          printf "\033[1;36m║                                                ║\033[0m\n"
          printf "\033[1;36m║  Everything in this push is visible to the     ║\033[0m\n"
          printf "\033[1;36m║  world, forever. See PROTOCOLS.md.             ║\033[0m\n"
          printf "\033[1;36m╚════════════════════════════════════════════════╝\033[0m\n\n"
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" = "main" ]; then
            printf "\033[1;31m⛔ You're pushing to main. Branch-protected in CI — this will fail. Use a PR.\033[0m\n\n"
            exit 1
          fi
          # Show what's being pushed
          UPSTREAM="origin/$BRANCH"
          if git rev-parse --verify "$UPSTREAM" >/dev/null 2>&1; then
            printf "\033[1mCommits in this push:\033[0m\n"
            git log --oneline "$UPSTREAM..HEAD" | head -10 | sed 's/^/  /'
          fi
          # Time-of-day warning
          HOUR=$(date +%H)
          if [ "$HOUR" -lt 7 ] || [ "$HOUR" -ge 22 ]; then
            printf "\n\033[1;33m⏰ It's %s:00 — outside 7 AM–10 PM window. Consider waiting until morning.\033[0m\n" "$HOUR"
            printf "\033[1;33m   Press Ctrl-C to cancel. 5-second cooling-off...\033[0m\n"
            sleep 5
          else
            # Normal business hours — shorter pause
            sleep 2
          fi
        fi
    full-guard:
      # Full Sloppy Guard before push.
      run: bun run guard
